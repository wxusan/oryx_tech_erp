name: Release production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type RELEASE_PRODUCTION after preview and migration rehearsal approval
        required: true
      repair_malika_owner:
        description: Run the one-time guarded Malika Mobile Pro owner repair
        required: false
        type: boolean
        default: false
      resolve_failed_accounting_migration:
        description: Resolve the rolled-back 202607150004 transaction after verifying that no schema artifacts survived
        required: false
        type: boolean
        default: false
      repair_nasiya_ledger:
        description: Archive and repair the one reviewed Nasiya parent-ledger cache mismatch
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main' && inputs.confirm == 'RELEASE_PRODUCTION'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      MALIKA_OWNER_REPAIR_PASSWORD: ${{ secrets.MALIKA_OWNER_REPAIR_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm install --global npm@10.9.4
      - run: npm ci
      - name: Verify exact main commit and successful CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          ci_runs="$(gh run list --workflow ci.yml --branch main --commit "$GITHUB_SHA" --event push --status success --limit 10 --json conclusion,event,headBranch,headSha)"
          jq -e --arg sha "$GITHUB_SHA" 'any(.[]; .conclusion == "success" and .event == "push" and .headBranch == "main" and .headSha == $sha)' <<< "$ci_runs"
      - name: Pull production configuration
        run: npx vercel@51.7.0 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build, migrate, and create an unaliased production deployment
        id: deploy
        run: |
          release_attempt="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          resolve_args=()
          if [[ "${{ inputs.resolve_failed_accounting_migration }}" == "true" ]]; then
            resolve_args+=(--build-env ORYX_FAILED_MIGRATION_RESOLUTION=resolve-failed-202607150004_complete_accounting_redesign)
          fi
          deploy_args=(
            --yes
            --prod
            --skip-domain
            --no-wait
            --force
            --build-env ORYX_GUARDED_RELEASE=github-actions
            "${resolve_args[@]}"
            --meta "releaseCommit=$GITHUB_SHA"
            --meta "releaseAttempt=$release_attempt"
            --token="${{ secrets.VERCEL_TOKEN }}"
          )
          if [[ "${{ inputs.repair_malika_owner }}" == "true" ]]; then
            test -n "$MALIKA_OWNER_REPAIR_PASSWORD"
            deploy_args+=(--build-env ORYX_MALIKA_OWNER_REPAIR=1 --build-env "ORYX_MALIKA_OWNER_REPAIR_PASSWORD=$MALIKA_OWNER_REPAIR_PASSWORD")
          else
            if [[ "${{ inputs.repair_nasiya_ledger }}" == "true" ]]; then
              deploy_args+=(--build-env ORYX_NASIYA_LEDGER_REPAIR=1 --build-env ORYX_NASIYA_LEDGER_REPAIR_APPROVER_LOGIN=wxusan)
            fi
          fi

          set +e
          npx vercel@51.7.0 deploy "${deploy_args[@]}"
          create_status=$?
          set -e

          deployment_url=""
          deployment_state=""
          for poll in {1..60}; do
            if ! deployments_json="$(npx vercel@51.7.0 list --scope="$VERCEL_ORG_ID" --meta "releaseCommit=$GITHUB_SHA" --meta "releaseAttempt=$release_attempt" --format=json --no-color --token="${{ secrets.VERCEL_TOKEN }}")"; then
              sleep 10
              continue
            fi
            deployment_count="$(jq '.deployments | length' <<< "$deployments_json")"
            if (( deployment_count > 1 )); then
              echo "Release attempt resolved to multiple deployments; refusing ambiguous promotion" >&2
              exit 1
            fi
            deployment_url="$(jq -r '.deployments[0].url // empty' <<< "$deployments_json")"
            deployment_state="$(jq -r '.deployments[0].state // empty' <<< "$deployments_json")"
            case "$deployment_state" in
              READY) break ;;
              ERROR|CANCELED)
                echo "Unaliased deployment ended in $deployment_state" >&2
                exit 1
                ;;
            esac
            sleep 10
          done
          if [[ -z "$deployment_url" || "$deployment_state" != "READY" ]]; then
            echo "Vercel did not produce one ready deployment (create exit $create_status)" >&2
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
      - name: Inspect and smoke the exact production artifact
        id: verify
        run: |
          inspect_json="$(npx vercel@51.7.0 inspect "${{ steps.deploy.outputs.url }}" --format=json --scope="$VERCEL_ORG_ID" --token="${{ secrets.VERCEL_TOKEN }}")"
          jq -e '
            .readyState == "READY"
            and ([.builds[].config.vercelConfig.regions[]?] | unique) == ["bom1"]
            and ([.builds[].output[]?
                  | select(.lambda != null and .path != "_middleware")
                  | .lambda.deployedTo[]?] | length) > 0
            and ([.builds[].output[]?
                  | select(.lambda != null and .path != "_middleware")
                  | .lambda.deployedTo[]?] | unique) == ["bom1"]
            and any(.builds[].output[]?;
              .path == "api/health" and .lambda.deployedTo == ["bom1"])
          ' <<< "$inspect_json"
          deployment_id="$(jq -r '.id // empty' <<< "$inspect_json")"
          [[ "$deployment_id" == dpl_* ]]
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          health_json="$(npx vercel@51.7.0 curl /api/health --deployment "${{ steps.deploy.outputs.url }}" --yes --token="${{ secrets.VERCEL_TOKEN }}" -- --fail --silent --show-error --retry 3 --retry-all-errors)"
          jq -e --arg commit "${GITHUB_SHA:0:7}" '.ok == true and .database == "ok" and .commit == $commit' <<< "$health_json"
      - name: Recheck main and promote the verified artifact
        run: |
          remote_main="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          test "$remote_main" = "$GITHUB_SHA"
          npx vercel@51.7.0 promote "${{ steps.verify.outputs.deployment_id }}" --yes --scope="$VERCEL_ORG_ID" --token="${{ secrets.VERCEL_TOKEN }}"
